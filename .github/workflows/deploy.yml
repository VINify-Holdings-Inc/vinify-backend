name: Deploy to production

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-065704b19bce21f09" \
            --document-name "AWS-RunShellScript" \
            --comment "vinify-backend deploy from ${{ github.sha }}" \
            --parameters 'commands=[
              "set -e",
              "cd /var/www/api",
              "sudo -u ubuntu git fetch origin",
              "sudo -u ubuntu git reset --hard origin/main",
              "sudo -u ubuntu env PATH=/home/ubuntu/.nvm/versions/node/v22.16.0/bin:$PATH npm ci",
              "sudo -u ubuntu env PATH=/home/ubuntu/.nvm/versions/node/v22.16.0/bin:$PATH bash -c \"cd /var/www/api && pm2 reload ecosystem.config.js --env production\""
            ]' \
            --output text --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-065704b19bce21f09" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-065704b19bce21f09" \
            --output json > invocation.json

          cat invocation.json

          STATUS=$(python3 -c "import json;print(json.load(open('invocation.json'))['Status'])")
          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS"
            exit 1
          fi
